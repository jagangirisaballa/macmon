name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine requests

      - name: Build package
        run: python -m build

      - name: Publish to PyPI (skip if version already exists)
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          VERSION=$(python -c "import re; v=open('pyproject.toml').read(); print(re.search(r'version = \"(.+?)\"', v).group(1))")
          STATUS=$(python -c "import urllib.request; r=urllib.request.urlopen('https://pypi.org/pypi/macmon/$VERSION/json'); print(r.status)" 2>/dev/null || echo "404")
          if [ "$STATUS" = "200" ]; then
            echo "Version $VERSION already on PyPI — skipping upload"
          else
            twine upload dist/*
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body: |
            ## Install

            ```bash
            pip3 install --upgrade macmon
            ```

            Full changelog: https://github.com/jagangirisaballa/macmon/commits/main
